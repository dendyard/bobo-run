<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bobo Contra</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="720" height="1280" aria-label="Bobo Contra game canvas"></canvas>

      <section class="hud" aria-label="Status permainan">
        <div class="hud-logo" aria-label="Bobo Run">
          <strong>Bobo</strong>
          <span>Run</span>
        </div>
        <div class="meter">
          <span>HP</span>
          <div class="bar"><i id="hpBar"></i></div>
        </div>
        <div class="stat timer-stat">
          <span class="hud-clock" aria-hidden="true"></span>
          <strong id="time">00:00</strong>
        </div>
        <div class="stat">
          <img class="hud-star" src="assets/star.png" alt="">
          <strong id="score">0</strong>
        </div>
        <div class="stat wave-stat">
          <span>Lv</span>
          <strong id="wave">1</strong>
        </div>
        <button id="pauseBtn" type="button" title="Pause">♪</button>
      </section>

      <section class="overlay show-logo" id="overlay">
        <img class="game-logo" src="assets/gamelogo.png" alt="Bobo Run">
        <h1 class="overlay-title">Bobo Contra</h1>
        <p>Bobo berlari otomatis. Tap layar atau tekan panah atas untuk lompat.</p>
        <div class="end-panel" id="endPanel" aria-label="Statistik akhir permainan">
          <div class="end-banner">
            <img src="assets/bg-stars-stat.png" alt="">
            <strong id="endTitle">End Game!</strong>
          </div>
          <div class="end-stars" aria-hidden="true">
            <img src="assets/star.png" alt="">
            <img src="assets/star.png" alt="">
            <img src="assets/star.png" alt="">
          </div>
          <div class="end-stats">
            <div class="end-stat-row">
              <span>Koin</span>
              <strong id="statCoins">0/0</strong>
            </div>
            <div class="end-stat-row">
              <span>Musuh Dikalahkan</span>
              <strong id="statMonsters">0</strong>
            </div>
            <div class="end-stat-row">
              <span>Skor</span>
              <strong id="statScore">0</strong>
            </div>
          </div>
        </div>
        <button id="startBtn" type="button">Mulai</button>
      </section>

      <section class="touch-controls" aria-label="Kontrol sentuh">
        <button data-tap="jump" aria-label="Lompat">↑</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
